name: TechMart Pipeline CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check producer syntax
        run: python -m py_compile src/producer.py

      - name: Check consumer syntax
        run: python -m py_compile src/consumer.py

      - name: Check config syntax
        run: python -m py_compile config/config.py

      - name: Build Docker images
        run: docker compose build

      - name: Verify Docker images exist
        run: docker images | grep techmart